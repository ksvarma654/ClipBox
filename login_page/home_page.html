<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <link rel="stylesheet" href="homepage.css">
</head>

<body>

<header>
    <div class="header-homepage">

        <!-- Logo -->
        <div class="homepage-logo">
            <img src="logo16.svg" alt="logo"> 
        </div>

        <!-- Title -->
        <div class="homepage-text">
            <a href="home_page.html"><b>CLIP BOX</b></a>
        </div>

        <!-- Search + Login + Cart -->
        <div class="home-page-search-login">

            <!-- Search -->
            <div class="home-page-search-box">
                <input type="text" placeholder="search">
            </div>

            <!-- ✅ USER LOGIN SECTION -->
            <div class="home-page-login">

                <div class="user-menu" onclick="toggleMenu()">
                    <img src="login_icon.svg" alt="login_icon">
                    <span id="user-name">Login</span>
                </div>

                <!-- Dropdown -->
                <div class="dropdown-menu" id="dropdown-menu">
                    <p onclick="showProfile()">My Profile</p>
                    <p onclick="showPurchases()">My Purchases</p>
                    <p onclick="logout()">Logout</p>
                </div>

            </div>

            <!-- Cart -->
            <!-- <div class="home-page-cart">
                <a href="#">
                    <img src="cart_icon.svg" alt="cart_icon">
                    <span>Cart</span>
                </a>
            </div> -->
            <div class="home-page-cart" id="home-page-cart-top"> 
                <a href=""> 
                <img src="cart_icon.svg" alt="cart_icon"> 
                <span>Cart</span>
             </a> 
            </div>
 
        </div>

    </div>
</header>

<!-- Menu -->
<div class="menu-nav">
    <div class="three-line-ellipsis">
        <span>All</span>
    </div>

    <div class="menu-list">
        <ul>
            <li><a href="#">Mobiles</a></li>
            <li><a href="#">Electronics</a></li>
            <li><a href="#">Fashion</a></li>    
        </ul>
    </div>
</div>

<main></main>

<hr>

<footer>
    <p>@2026 Clip Box All Rights Reserved</p>
</footer>

<!-- ✅ JAVASCRIPT -->
<script>

// Get user
const user = sessionStorage.getItem("loggedInUser");

// Elements
const userNameElement = document.getElementById("user-name");
const dropdown = document.getElementById("dropdown-menu");

// Show username
if(user){
    userNameElement.textContent = user;
}else{
    userNameElement.textContent = "Login";
}

// Toggle menu
function toggleMenu(){

    if(!user){
        window.location.href = "login.html";
        return;
    }

    dropdown.style.display =
        dropdown.style.display === "block" ? "none" : "block";
}

// Profile
function showProfile(){
    alert("My Profile - Coming Soon");
}

// Purchases
function showPurchases(){
    alert("My Purchases - Coming Soon");
}

// Logout
function logout(){
    sessionStorage.removeItem("loggedInUser");
    window.location.href = "login.html";
}

// Close dropdown when clicking outside
window.onclick = function(event) {
    if (!event.target.closest('.user-menu')) {
        dropdown.style.display = "none";
    }
}

</script>

</body>
</html>
