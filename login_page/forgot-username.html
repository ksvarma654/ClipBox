<!DOCTYPE html>
<html>
<head>
    <title>Forgot Username</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="logo16.svg">
    <a href="login.html"><b>CLIP BOX</b></a>
</header>

<main>
    <div class="right-panel">
        <h2>Recover Username</h2>
<input style="width:300px;" type="email" id="email" placeholder="Enter your Email"><br>

<div class="btn-group">
    <button onclick="recoverUser()">Submit</button>
    <button onclick="goBack()">Back</button>
</div>

        <p id="msg"></p>
    </div>
</main>

<script>
function recoverUser() {
    document.getElementById("msg").innerText =
    "Your username sent to email (demo)";
}
function goBack() {
    window.location.href = "login.html";
}
</script>

</body>
</html>
